<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omniverse</title>
    <link rel="icon" type="image/jpeg" href="https://files.aecplustech.com/eyJidWNrZXQiOiJhZWNwbHVzdGVjaC1maWxlcyIsImtleSI6InByb2ZpbGUvY2M3MjJjYzYtNzEzZi00MjM1LTkxYzgtOGYwMDYyMTcxZDNmLmpwZyIsImVkaXRzI[...]
    <style>
* {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Smooth easing functions (Apple-style) */
@keyframes fadeInScale {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes expandHeight {
    from {
        opacity: 0;
        max-height: 0;
    }
    to {
        opacity: 1;
        max-height: 500px;
    }
}

@keyframes collapseHeight {
    from {
        opacity: 1;
        max-height: 500px;
    }
    to {
        opacity: 0;
        max-height: 0;
    }
}

@keyframes listItemFadeIn {
    from {
        opacity: 0;
        transform: translateX(-8px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes shimmer {
    0% {
        background-position: -1000px 0;
    }
    100% {
        background-position: 1000px 0;
    }
}

.btn-view-log {
    background: rgba(207, 105, 17, 0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: white;
    margin-top: 12px;
    width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.3);
    cursor: pointer;
    font-weight: 600;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
}

.btn-view-log:hover {
    background: rgba(207, 105, 17, 0.3);
    border-color: rgba(255, 255, 255, 0.5);
    transform: translateY(-1px);
    box-shadow: 0 20px 40px rgba(207, 105, 17, 0.2);
}

.btn-view-log:active {
    transform: translateY(0);
    box-shadow: 0 10px 20px rgba(207, 105, 17, 0.15);
}

#log-container {
    margin-top: 20px;
    text-align: left;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    max-height: 180px;
    overflow-y: auto;
    width: 100%;
    box-sizing: border-box;
    animation: expandHeight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.1);
}

#log-container.collapsing {
    animation: collapseHeight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

#log-container h3 {
    margin: 0 0 10px 0;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.95);
    font-weight: 600;
}

#log-list {
    list-style: none;
    padding: 0;
    margin: 0;
    font-family: monospace;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
}

#log-list li {
    padding: 6px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    animation: listItemFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

#log-list li:nth-child(1) { animation-delay: 0.05s; }
#log-list li:nth-child(2) { animation-delay: 0.1s; }
#log-list li:nth-child(3) { animation-delay: 0.15s; }
#log-list li:nth-child(4) { animation-delay: 0.2s; }
#log-list li:nth-child(5) { animation-delay: 0.25s; }
#log-list li:nth-child(n+6) { animation-delay: 0.3s; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0a0e27, #1a1f4e, #2d1b4e);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

body::before {
    content: '';
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle, rgba(207, 105, 17, 0.1) 0%, transparent 70%);
    animation: shimmer 20s linear infinite;
    pointer-events: none;
}

.container {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.1);
    text-align: center;
    width: 90%;
    max-width: 450px;
    animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
}

h1 { 
    color: rgba(255, 255, 255, 0.95); 
    font-size: 22px; 
    margin-bottom: 20px; 
    font-weight: 700;
    letter-spacing: -0.3px;
    animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

input[type="text"] {
    width: 100%; 
    padding: 14px; 
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px; 
    font-size: 16px; 
    box-sizing: border-box; 
    outline: none;
    color: rgba(255, 255, 255, 0.95);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

input[type="text"]:focus { 
    border-color: rgba(0, 113, 227, 0.5);
    box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2), inset 0 1px 3px rgba(255, 255, 255, 0.1);
    transform: scale(1.01);
    background: rgba(255, 255, 255, 0.12);
}

input[type="text"]::placeholder {
    color: rgba(255, 255, 255, 0.5);
    transition: color 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

input[type="text"]:focus::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.btn {
    margin-top: 15px; 
    width: 100%; 
    color: white; 
    border: none;
    padding: 14px; 
    font-size: 16px; 
    border-radius: 12px;
    cursor: pointer; 
    font-weight: 600; 
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.btn:active::before {
    width: 300px;
    height: 300px;
}

.btn-go { 
    background: rgba(0, 0, 0, 0.3);
    margin-top: 15px;
    animation-delay: 0.2s;
}

.btn-go:hover { 
    background: rgba(0, 0, 0, 0.4);
    border-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.1);
}

.btn-go:active {
    transform: translateY(0);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.btn-send { 
    background: rgba(0, 113, 227, 0.3);
    margin-top: 25px;
    animation-delay: 0.3s;
}

.btn-send:hover { 
    background: rgba(0, 113, 227, 0.4);
    border-color: rgba(0, 113, 227, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(0, 113, 227, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.1);
}

.btn-send:active {
    transform: translateY(0);
    box-shadow: 0 10px 20px rgba(0, 113, 227, 0.15);
}

.status { 
    margin-top: 12px; 
    font-size: 13px; 
    color: rgba(255, 255, 255, 0.7);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
    letter-spacing: 0.3px;
}

.status.error {
    color: #ff6b6b;
    animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Scroll smooth behavior */
#log-list::-webkit-scrollbar {
    width: 6px;
}

#log-list::-webkit-scrollbar-track {
    background: transparent;
}

#log-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    transition: background 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#log-list::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
}
    </style>
</head>
<body>

<div class="container">
    <h1>Search securely with Brave, or type a URL.</h1>
    <form id="searchForm">
        <input type="text" id="targetInput" placeholder="Type query or website address..." required autofocus>
        <button type="submit" class="btn btn-go">Go</button>
    </form>

<button id="sendLogsBtn" class="btn btn-send">Send log</button>
<div id="statusMessage" class="status">0 items currently in log. Ready to send.</div>

<button id="view-log-btn" class="btn btn-view-log" onclick="toggleLog()">View Current Log</button>

<div id="log-container" class="hidden-log" style="display:none;">
    <h3>Activity Log</h3>
    <ul id="log-list"></ul>
</div>

</div>

<script>
    const PARENT_EMAIL = "marthawilde@gmail.com";
    const MAX_MAILTO_SIZE = 2000; // Safe limit for mailto body (in characters)

    const statusMessage = document.getElementById('statusMessage');
    const targetInput = document.getElementById('targetInput');

    function getStoredHistory() {
        const history = localStorage.getItem('searchHistory');
        return history ? JSON.parse(history) : [];
    }

    function updateStatusText() {
        const count = getStoredHistory().length;
        statusMessage.textContent = `${count} item(s) currently in log. Ready to send.`;
        statusMessage.classList.remove('error');
    }

    function pruneHistoryIfNeeded(history) {
        // Keep removing oldest entries until the mailto body fits safely
        while (history.length > 0) {
            const formattedLog = history.map(item => `[${item.time}] ${item.searched_for}`).join('\n');
            const body = encodeURIComponent(`Here is the search history:\n\n${formattedLog}`);
            
            // If the body is within safe limits, we're done
            if (body.length <= MAX_MAILTO_SIZE) {
                break;
            }
            
            // Remove oldest entry (first in array)
            history.shift();
        }
        return history;
    }

    function toggleLog() {
        const logBox = document.getElementById("log-container");
        const btn = document.getElementById("view-log-btn");
        const logList = document.getElementById("log-list");
        
        if (logBox.classList.contains("hidden-log")) {
            logList.innerHTML = ""; 
            const history = getStoredHistory(); 
            
            if (history.length === 0) {
                logList.innerHTML = "<li style='color: rgba(255, 255, 255, 0.7);'>No items currently logged.</li>";
            } else {
                history.forEach(item => {
                    const li = document.createElement("li");
                    
                    const otherKeys = Object.keys(item).filter(key => key !== 'time');
                    const logText = otherKeys.length > 0 ? item[otherKeys[0]] : "Unknown Entry";
                    
                    li.textContent = item.time ? `[${item.time}] ${logText}` : logText;
                    logList.appendChild(li);
                });
            }
            
            logBox.classList.remove("hidden-log");
            logBox.classList.add("visible-log");
            logBox.style.display = "block";
            btn.innerText = "Hide Current Log";
        } else {
            logBox.classList.add("collapsing");
            setTimeout(() => {
                logBox.classList.remove("visible-log");
                logBox.classList.add("hidden-log");
                logBox.classList.remove("collapsing");
                logBox.style.display = "none";
                btn.innerText = "View Current Log";
            }, 300);
        }
    }

    document.getElementById('searchForm').addEventListener('submit', function(e) {
        const input = targetInput.value.trim();
        let destinationUrl = "";

        if (input.includes('.') && !input.includes(' ')) {
            destinationUrl = input.startsWith('http') ? input : 'https://' + input;
        } else {
            destinationUrl = 'https://search.brave.com/search?q=' + encodeURIComponent(input) + '&source=web';
        }

        const currentHistory = getStoredHistory();
        currentHistory.push({
            time: new Date().toLocaleString(),
            searched_for: input
        });
        localStorage.setItem('searchHistory', JSON.stringify(currentHistory));
        updateStatusText();

        window.open(destinationUrl, '_blank');
        
        // Clear the input field
        targetInput.value = '';
        
        e.preventDefault(); 
    });

    document.getElementById('sendLogsBtn').addEventListener('click', function() {
        let currentHistory = getStoredHistory();

        if (currentHistory.length === 0) {
            statusMessage.textContent = "Log is empty! Nothing to send.";
            statusMessage.classList.add('error');
            return;
        }

        // Prune history if it exceeds safe mailto size
        currentHistory = pruneHistoryIfNeeded(currentHistory);

        if (currentHistory.length === 0) {
            statusMessage.textContent = "Error: Log entries too large to send. Cleared.";
            statusMessage.classList.add('error');
            localStorage.removeItem('searchHistory');
            updateStatusText();
            return;
        }

        const formattedLog = currentHistory.map(item => `[${item.time}] ${item.searched_for}`).join('\n');
        
        const subject = encodeURIComponent("Search History Report");
        const body = encodeURIComponent(`Here is the search history:\n\n${formattedLog}`);

        window.open(`mailto:${PARENT_EMAIL}?subject=${subject}&body=${body}`, '_blank');

        localStorage.removeItem('searchHistory');
        updateStatusText();
    });

    updateStatusText();
</script>

</body>
</html>
